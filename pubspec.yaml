name: solid_oidc_auth
description: Authentication library for Solid pods using OpenID Connect (Solid-OIDC) with DPoP token support.
version: 0.2.0
repository: https://github.com/locorda/solid_oidc_auth
topics:
  - solid
  - oidc
  - authentication
  - webid

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  dart_jsonwebtoken: ^3.3.2
  crypto: ^3.0.6
  fast_rsa: ^3.8.1
  http: ^1.3.0
  logging: ^1.3.0
  uuid: ^4.5.1
  oidc: ^0.14.0+2
  oidc_default_store: ^0.6.0+2
  locorda_rdf_core: ^0.12.1
  meta: ^1.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  lints: ^6.0.0

flutter:
  assets:
    - packages/fast_rsa/web/assets/worker.js
    - packages/fast_rsa/web/assets/wasm_exec.js
    - packages/fast_rsa/web/assets/rsa.wasm

